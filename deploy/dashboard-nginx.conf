server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy server-side a la API de n8n (red interna de Docker). Inyecta la API
    # key aquí para que NO viaje en el bundle del navegador, y evita que el
    # navegador tenga que alcanzar backoffice (protegido por Cloudflare Access).
    # __N8N_API_KEY__ se reemplaza en el servidor al desplegar (deploy).
    location /n8n-api/ {
        proxy_pass http://n8n:5678/api/v1/;
        proxy_set_header X-N8N-API-KEY "__N8N_API_KEY__";
        proxy_set_header Host $host;
        proxy_http_version 1.1;
    }
}
